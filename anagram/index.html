    <style>
      /* Global Styles & Colors */
      :root {
        --green: #6aaa64;
        --green: #1565C0;
        --darkendGreen: #538d4e;
        --darkendGreen: #0D47A1;
        --yellow: #c9b458;
        --yellow: #e04349;
        --darkendYellow: #b59f3b;
        --darkendYellow: #c0343a;
        --lightGray: #d8d8d8;
        --gray: #86888a;
        --darkGray: #939598;
        --white: #fff;
        --black: #212121;
        /* Colorblind colors */
        --orange: #f5793a;
        --blue: #85c0f9;
        font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        --header-height: auto;
        --sv-header-padding: 10px 0;
        --keyboard-height: 200px;
        --game-max-width: 500px;
        --sv-flex-wrap:wrap;
        --sv-menu-width:69px;
        --sv-title-position:relative;
        --sv-mode-toggle-order:3;
        --sv-mode-toggle-margin:10px auto 0;
        --sv-mode-toggle-width:auto;
        --sv-game-height:100%;
      }
      /* Light theme colors */
      :root {
        --color-tone-1: #1a1a1b;
        --color-tone-2: #787c7e;
        --color-tone-3: #878a8c;
        --color-tone-4: #d3d6da;
        --color-tone-5: #edeff1;
        --color-tone-6: #f6f7f8;
        --color-tone-7: #ffffff;
        --opacity-50: rgba(255, 255, 255, 0.5);
      }
      /* Dark Theme Colors */
      .nightmode {
        --color-tone-1: #d7dadc;
        --color-tone-2: #818384;
        --color-tone-3: #565758;
        --color-tone-4: #3a3a3c;
        --color-tone-5: #272729;
        --color-tone-6: #1a1a1b;
        --color-tone-7: #121213;
        --opacity-50: rgba(0, 0, 0, 0.5);
      }
      /* Constant colors and colors derived from theme */
      :root,
      .nightmode {
        --color-background: var(--color-tone-7);
      }
      :root {
        --color-present: var(--yellow);
        --color-correct: var(--green);
        --color-absent: var(--color-tone-2);
        --tile-text-color: var(--color-tone-7);
        --key-text-color: var(--color-tone-1);
        --key-evaluated-text-color: var(--color-tone-7);
        --key-bg: var(--color-tone-4);
        --key-bg-present: var(--color-present);
        --key-bg-correct: var(--color-correct);
        --key-bg-absent: var(--color-absent);
        --modal-content-bg: var(--color-tone-7);
      }
      .nightmode {
        --color-present: var(--darkendYellow);
        --color-correct: var(--darkendGreen);
        --color-absent: var(--color-tone-4);
        --tile-text-color: var(--color-tone-1);
        --key-text-color: var(--color-tone-1);
        --key-evaluated-text-color: var(--color-tone-1);
        --key-bg: var(--color-tone-2);
        --key-bg-present: var(--color-present);
        --key-bg-correct: var(--color-correct);
        --key-bg-absent: var(--color-absent);
        --modal-content-bg: var(--color-tone-7);
      }
      .colorblind {
        --color-correct: var(--orange);
        --color-present: var(--blue);
        --tile-text-color: var(--white);
        --key-bg-present: var(--color-present);
        --key-bg-correct: var(--color-correct);
        --key-bg-absent: var(--color-absent);
      }
      html {
        height: 100%;
      }
      body {
        height: 100%;
        background-color: var(--color-background);
        margin: 0;
        padding: 0;
        /* Prevent scrollbar appearing on page transition */
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      game-app {
        flex: 1 1 auto;
        min-height: 0;
        display: block;
      }
      /* ---- Game switcher bar ---- */
      #sv-gamebar {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 38px;
        border-bottom: 1px solid var(--color-tone-4);
        background-color: var(--color-background);
      }
      #sv-gamebar-btn {
        background: none;
        border: none;
        color: var(--color-tone-1);
        font-family: inherit;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
      }
      #sv-gamebar-icon {
        display: inline-grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2px;
        width: 13px;
        height: 13px;
      }
      #sv-gamebar-icon span {
        background: var(--color-tone-1);
        border-radius: 1px;
      }
      /* ---- Game switcher modal ---- */
      #sv-gamemenu-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--opacity-50);
        z-index: 5000;
        justify-content: center;
        align-items: flex-start;
        padding-top: 56px;
      }
      #sv-gamemenu {
        background: var(--modal-content-bg);
        color: var(--color-tone-1);
        border: 1px solid var(--color-tone-6);
        border-radius: 8px;
        box-shadow: 0 4px 23px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 360px;
        overflow: hidden;
      }
      .sv-gamemenu-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid var(--color-tone-4);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 14px;
      }
      .sv-gamemenu-close {
        background: none;
        border: none;
        color: var(--color-tone-1);
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        padding: 0 4px;
      }
      .sv-game-group {
        padding: 14px 16px;
        border-bottom: 1px solid var(--color-tone-4);
      }
      .sv-game-group:last-child {
        border-bottom: none;
      }
      .sv-game-name {
        font-weight: 700;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        color: var(--color-tone-1);
      }
      .sv-game-scripts {
        display: flex;
        gap: 8px;
      }
      .sv-game-link {
        flex: 1;
        text-align: center;
        padding: 9px 8px;
        border: 2px solid var(--color-tone-4);
        border-radius: 6px;
        text-decoration: none;
        color: var(--color-tone-1);
        font-weight: 600;
        font-size: 13px;
      }
      .sv-game-link.current {
        border-color: var(--color-correct);
        color: var(--color-correct);
      }
    </style>

    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <script src="main.js"></script>

    <div id="sv-gamebar">
      <button id="sv-gamebar-btn" type="button" aria-label="Све игре">
        <span id="sv-gamebar-icon"><span></span><span></span><span></span><span></span></span>
        СВЕ ИГРЕ
      </button>
    </div>

    <game-app></game-app>

    <div id="sv-gamemenu-overlay">
      <div id="sv-gamemenu">
        <div class="sv-gamemenu-head">
          <span>Игре</span>
          <button class="sv-gamemenu-close" type="button" aria-label="Затвори">&times;</button>
        </div>
        <div class="sv-game-group">
          <div class="sv-game-name">Вордл</div>
          <div class="sv-game-scripts">
            <a class="sv-game-link" href="/">Ћирилица</a>
            <a class="sv-game-link" href="/latinica/">Latinica</a>
          </div>
        </div>
        <div class="sv-game-group">
          <div class="sv-game-name">Анаграм</div>
          <div class="sv-game-scripts">
            <a class="sv-game-link current" href="/anagram/">Ћирилица</a>
            <a class="sv-game-link" href="/anagram/latinica/">Latinica</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var btn = document.getElementById("sv-gamebar-btn");
        var overlay = document.getElementById("sv-gamemenu-overlay");
        var closeBtn = overlay.querySelector(".sv-gamemenu-close");
        function close() { overlay.style.display = "none"; }
        btn.addEventListener("click", function () { overlay.style.display = "flex"; });
        closeBtn.addEventListener("click", close);
        overlay.addEventListener("click", function (e) { if (e.target === overlay) close(); });
        document.addEventListener("keydown", function (e) { if (e.key === "Escape") close(); });
      })();
    </script>
  </body>
</html>
