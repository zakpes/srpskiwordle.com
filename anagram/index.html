    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="/style.css">

    <style>
      /* Cyrillic brand palette (overrides Wordle-classic defaults in style.css) */
      :root {
        --green: #1565C0;
        --darkendGreen: #0D47A1;
        --yellow: #e04349;
        --darkendYellow: #c0343a;
      }
    </style>
  </head>
  <body>
    <script src="main.js"></script>

    <div id="sv-gamebar">
      <button id="sv-gamebar-btn" type="button" aria-label="Све игре">
        <span id="sv-gamebar-icon"><span></span><span></span><span></span><span></span></span>
        СВЕ ИГРЕ
      </button>
    </div>

    <game-app></game-app>

    <div id="sv-gamemenu-overlay">
      <div id="sv-gamemenu">
        <div class="sv-gamemenu-head">
          <span>Игре</span>
          <button class="sv-gamemenu-close" type="button" aria-label="Затвори">&times;</button>
        </div>
        <div class="sv-game-group">
          <div class="sv-game-name">Вордл</div>
          <div class="sv-game-scripts">
            <a class="sv-game-link" href="/"><img src="/imgs/vordl_logo_32x32.png" alt="">Ћирилица</a>
            <a class="sv-game-link" href="/latinica/"><img src="/imgs/vordl_lat_logo_32x32.png" alt="">Latinica</a>
          </div>
        </div>
        <div class="sv-game-group">
          <div class="sv-game-name">Анаграм</div>
          <div class="sv-game-scripts">
            <a class="sv-game-link current" href="/anagram/"><img src="/imgs/anagram_logo_32x32.png" alt="">Ћирилица</a>
            <a class="sv-game-link" href="/anagram/latinica/"><img src="/imgs/anagram_lat_logo_32x32.png" alt="">Latinica</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var btn = document.getElementById("sv-gamebar-btn");
        var overlay = document.getElementById("sv-gamemenu-overlay");
        var closeBtn = overlay.querySelector(".sv-gamemenu-close");
        function close() { overlay.classList.remove("open"); }
        btn.addEventListener("click", function () { overlay.classList.add("open"); });
        closeBtn.addEventListener("click", close);
        overlay.addEventListener("click", function (e) { if (e.target === overlay) close(); });
        document.addEventListener("keydown", function (e) { if (e.key === "Escape") close(); });
      })();
    </script>
  </body>
</html>
